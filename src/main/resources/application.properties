# ── App ───────────────────────────────────────────────────────────────────────
spring.application.name=tres-ofertas
server.port=8080

# ── Frontend ──────────────────────────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/tres_ofertas}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:local-dev-secret-change-in-prod}
app.jwt.expiration-days=15

# ── Google OAuth2 (Consumer) ──────────────────────────────────────────────────
spring.security.oauth2.client.registration.google-consumer.client-id=${GOOGLE_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.google-consumer.client-secret=${GOOGLE_CLIENT_SECRET:dummy}
spring.security.oauth2.client.registration.google-consumer.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google-consumer.scope=profile,email
spring.security.oauth2.client.registration.google-consumer.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google-consumer

spring.security.oauth2.client.provider.google-consumer.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google-consumer.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google-consumer.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google-consumer.user-name-attribute=sub

# ── Cloudinary ────────────────────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── Email (Resend via SMTP) ───────────────────────────────────────────────────
spring.mail.host=smtp.resend.com
spring.mail.port=465
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
app.mail.from=noreply@tresofertas.com.ar

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false
