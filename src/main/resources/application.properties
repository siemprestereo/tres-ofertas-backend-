# CONFIGURACI?N DE PRODUCCI?N
# ========================================

# URLs din?micas (se configuran en Railway como variables de entorno)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Servidor
server.address=0.0.0.0
server.port=${PORT:8080}

# CORS - Permitir frontend
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# ========================================
# BASE DE DATOS
# ========================================
# Railway configura DATABASE_URL autom?ticamente
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/professional_rating}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ========================================
# OAUTH2 GOOGLE - PROVIDER (COMPARTIDO)
# ========================================
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ========================================
# OAUTH2 GOOGLE - CLIENTES
# ========================================
spring.security.oauth2.client.registration.google-client.provider=google
spring.security.oauth2.client.registration.google-client.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google-client.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google-client.scope=profile,email
spring.security.oauth2.client.registration.google-client.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google-client
spring.security.oauth2.client.registration.google-client.client-name=Google Client


# ========================================
# OAUTH2 GOOGLE - PROFESIONALES
# ========================================
spring.security.oauth2.client.registration.google-professional.provider=google
spring.security.oauth2.client.registration.google-professional.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google-professional.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google-professional.scope=profile,email
spring.security.oauth2.client.registration.google-professional.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google-professional
spring.security.oauth2.client.registration.google-professional.client-name=Google Professional

# ========================================
# JWT
# ========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=1296000000

# ========================================
# EMAIL - ZOHO MAIL
# ========================================
# Zoho SMTP Configuration
spring.mail.host=smtp.zoho.com
spring.mail.port=587
spring.mail.username=noresponder@calificalo.com.ar
spring.mail.password=${ZOHO_APP_PASSWORD}

# SMTP Authentication & Security
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.zoho.com

# Connection Timeouts
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email Display Name
spring.mail.properties.mail.smtp.from=Calificalo <noresponder@calificalo.com.ar>