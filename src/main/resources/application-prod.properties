# Configuración de desarrollo local

# URL del frontend en desarrollo
app.frontend.url=http://localhost:5173

# Permitir conexiones desde cualquier IP (para acceder desde el teléfono)
server.address=0.0.0.0
server.port=8080

# OAuth2 Google - Redirect URI con localhost
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# CORS - Permitir frontend local
app.cors.allowed-origins=http://localhost:5173,http://192.168.1.116:5173

# Base de datos local
spring.datasource.url=jdbc:mysql://localhost:3306/professional_rating
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Flyway
spring.flyway.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# OAuth2 Google (usando variables de entorno de IntelliJ)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email